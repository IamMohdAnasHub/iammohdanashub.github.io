<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Login Page</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{box-sizing:border-box;font-family:Poppins}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a);
overflow:hidden;
}

/* floating glow */
body::before{
content:"";
position:absolute;
width:300px;
height:300px;
background:#22c55e;
border-radius:50%;
filter:blur(120px);
top:20%;
left:10%;
opacity:.35;
}

.login{
width:320px;
padding:30px;
border-radius:22px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.12);
backdrop-filter:blur(12px);
box-shadow:0 20px 60px rgba(0,0,0,.5);
position:relative;
z-index:2;
}

h2{
margin:0 0 20px;
text-align:center;
color:white;
}

.input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:1px solid rgba(255,255,255,.15);
background:rgba(255,255,255,.05);
color:white;
outline:none;
}

.input::placeholder{color:#94a3b8}

.btn{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#22c55e,#16a34a);
color:white;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 30px rgba(34,197,94,.35);
}

.small{
text-align:center;
margin-top:12px;
font-size:13px;
color:#94a3b8;
}

a{
color:#22c55e;
text-decoration:none;
}
</style>
</head>

<body>

<div class="login">
<h2>Login</h2>

<input class="input" type="email" placeholder="Email">
<input class="input" type="password" placeholder="Password">

<button class="btn">Login</button>

<p class="small">Don't have an account? <a href="#">Sign up</a></p>
</div>

</body>
</html>
