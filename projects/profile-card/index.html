<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a);
font-family:Poppins;
color:white;
background-size: 200% 200%;
animation: bgmove 12s ease infinite;
  
}

/* card */
.card{
width:320px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:22px;
padding:30px;
text-align:center;
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,0,0,.6);
transition:.4s;
}

  .card:hover{
transform: translateY(-12px) scale(1.03);
box-shadow: 0 25px 70px rgba(0,0,0,0.6),
            0 0 40px rgba(34,197,94,0.35),
            inset 0 0 20px rgba(255,255,255,0.05);
border: 1px solid rgba(34,197,94,0.6);
  }
  

/* profile image */
.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #22c55e;
margin-bottom:15px;
}

/* name */
h2{
margin:10px 0 5px;
}

/* bio */
p{
color:#94a3b8;
font-size:14px;
}

/* buttons */
.btn{
display:block;
margin-top:14px;
padding:12px;
border-radius:14px;
text-decoration:none;
color:white;
background:linear-gradient(45deg,#22c55e,#16a34a);
transition:.3s;
}
.btn:active{
transform: scale(0.96);
box-shadow: 0 5px 15px rgba(0,0,0,0.4) inset;
}
  
.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(34,197,94,.5);
}
@keyframes bgmove {
0% { background-position: 0% 50%; }
50% { background-position: 100% 50%; }
100% { background-position: 0% 50%; }
  }
  
</style>
</head>

<body>

<div class="card">

<img class="profile" src="anas.png">

<h2>Mohd Anas Khan</h2>
<p>From Learner → Creator → Future Developer</p>
  

<a class="btn" href="https://iammohdanashub.github.io" target="_blank">My Website</a>
<a class="btn" href="https://instagram.com/iammohdanas_" target="_blank">Instagram</a>

</div>

</body>
</html>
