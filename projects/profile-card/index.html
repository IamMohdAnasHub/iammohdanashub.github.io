koi<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a);
font-family:Poppins;
color:white;
}

/* card */
.card{
width:320px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:22px;
padding:30px;
text-align:center;
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,0,0,.6);
transition:.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
}

/* profile image */
.profile{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:3px solid #22c55e;
margin-bottom:15px;
}

/* name */
h2{
margin:10px 0 5px;
}

/* bio */
p{
color:#94a3b8;
font-size:14px;
}

/* buttons */
.btn{
display:block;
margin-top:14px;
padding:12px;
border-radius:14px;
text-decoration:none;
color:white;
background:linear-gradient(45deg,#22c55e,#16a34a);
transition:.3s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(34,197,94,.5);
}
</style>
</head>

<body>

<div class="card">

<img class="profile" src="anas.png">

<h2>Mohd Anas Khan</h2>
<p>Learning Web Development & Building Digital Identity</p>

<a class="btn" href="https://iammohdanashub.github.io">My Website</a>
<a class="btn" href="https://instagram.com/iammohdanas_" target="_blank">Instagram</a>

</div>

</body>
</html>
