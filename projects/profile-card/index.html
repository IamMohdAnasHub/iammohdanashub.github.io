<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#020617,#0f172a);
    font-family:Poppins;
    color:white;
}

/* card */
.card{
    width:320px;
    padding:30px;
    border-radius:20px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
    transition:.3s;
    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.card:hover{
    transform:translateY(-8px) scale(1.02);
}

/* profile image */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:linear-gradient(45deg,#22c55e,#4ade80);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
    font-weight:700;
    margin:auto;
    margin-bottom:15px;
}

/* name */
h2{
    margin:5px 0;
}

p{
    color:#94a3b8;
    font-size:14px;
}

/* buttons */
.links a{
    display:block;
    margin-top:12px;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    transition:.3s;
}

.links a:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="card">
<div class="avatar">A</div>

<h2>Mohd Anas Khan</h2>
<p>Learning Web Development • Building Projects</p>

<div class="links">
<a href="#">My Website</a>
<a href="#">Instagram</a>
<a href="#">Contact Me</a>
</div>
</div>

</body>
</html>
