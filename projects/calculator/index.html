<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculator (Working)</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

*{box-sizing:border-box;font-family:Poppins}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  padding:30px;
}

.wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
}

.title{
  margin:0;
  font-size:18px;
  color:#94a3b8;
  letter-spacing:.5px;
}

.calc{
  width:320px;
  border-radius:22px;
  padding:18px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(12px);
  box-shadow:0 25px 70px rgba(0,0,0,0.55);
}

.screen{
  height:98px;
  border-radius:16px;
  padding:14px;
  background:rgba(0,0,0,0.25);
  border:1px solid rgba(255,255,255,0.10);
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:right;
  overflow:hidden;
}

.screen .small{
  font-size:14px;
  color:#94a3b8;
  white-space:nowrap;
  text-overflow:ellipsis;
  overflow:hidden;
  min-height:18px;
}

.screen .big{
  font-size:34px;
  font-weight:700;
  margin-top:6px;
  white-space:nowrap;
  text-overflow:ellipsis;
  overflow:hidden;
}

.grid{
  margin-top:14px;
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:12px;
}

.btn{
  height:54px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  color:white;
  font-size:18px;
  font-weight:600;
  cursor:pointer;
  transition:0.2s;
  user-select:none;
}

.btn:hover{
  transform:translateY(-2px);
  background:rgba(255,255,255,0.10);
}

.btn:active{
  transform:scale(0.97);
}

.op{
  background:rgba(34,197,94,0.18);
  border:1px solid rgba(34,197,94,0.45);
}

.op:hover{
  background:rgba(34,197,94,0.28);
}

.equal{
  grid-column: span 2;
  background:linear-gradient(45deg,#22c55e,#16a34a);
  border:none;
}

.equal:hover{
  filter:brightness(1.05);
}

.danger{
  background:rgba(239,68,68,0.20);
  border:1px solid rgba(239,68,68,0.45);
}

.note{
  font-size:12px;
  color:#94a3b8;
  text-align:center;
  max-width:320px;
}

.history{
  width:320px;
  margin-top:12px;
  padding:14px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.10);
  backdrop-filter:blur(10px);
}

.history h4{
  margin:0 0 10px;
  font-size:14px;
  color:#cbd5e1;
  font-weight:700;
  letter-spacing:.3px;
}

.history ul{
  margin:0;
  padding:0;
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.history li{
  font-size:13px;
  color:#94a3b8;
  display:flex;
  justify-content:space-between;
  gap:10px;
}

.history li span:last-child{
  color:#e2e8f0;
  font-weight:600;
}

a.back{
  color:#94a3b8;
  text-decoration:none;
  font-size:13px;
}
a.back:hover{color:white}
</style>
</head>

<body>
  <div class="wrap">
    <p class="title">Calculator (Working)</p>

    <div class="calc">
      <div class="screen">
        <div class="small" id="expr"></div>
        <div class="big" id="out">0</div>
      </div>

      <div class="grid">
        <button class="btn danger" data-action="clear">C</button>
        <button class="btn" data-action="backspace">⌫</button>
        <button class="btn op" data-op="%">%</button>
        <button class="btn op" data-op="/">÷</button>

        <button class="btn" data-num="7">7</button>
        <button class="btn" data-num="8">8</button>
        <button class="btn" data-num="9">9</button>
        <button class="btn op" data-op="*">×</button>

        <button class="btn" data-num="4">4</button>
        <button class="btn" data-num="5">5</button>
        <button class="btn" data-num="6">6</button>
        <button class="btn op" data-op="-">−</button>

        <button class="btn" data-num="1">1</button>
        <button class="btn" data-num="2">2</button>
        <button class="btn" data-num="3">3</button>
        <button class="btn op" data-op="+">+</button>

        <button class="btn" data-num="0">0</button>
        <button class="btn" data-action="dot">.</button>
        <button class="btn equal" data-action="equals">=</button>
      </div>
    </div>

    <div class="history">
      <h4>History (last 5)</h4>
      <ul id="historyList"></ul>
    </div>

    <div class="note">Tip: keyboard works (0-9, + - * / %, Enter, Backspace, Esc).</div>
    <a class="back" href="../../index.html">← Back to Portfolio</a>
  </div>

<script>
(() => {
  const exprEl = document.getElementById("expr");
  const outEl  = document.getElementById("out");
  const historyList = document.getElementById("historyList");

  // State
  let current = "0";
  let previous = null;
  let op = null;
  let justEvaluated = false;

  // History store
  const history = []; // {exp, res}

  const opSymbol = (o) => (o === "*") ? "×" : (o === "/") ? "÷" : o;

  const fmt = (n) => {
    if (!isFinite(n)) return "Error";
    const s = Number(n.toFixed(12)).toString();
    return s.length > 14 ? n.toExponential(6) : s;
  };

  const setOut = (v) => { outEl.textContent = v; };

  // Live expression like: 12 + 7
  const setExpr = () => {
    if (op && previous !== null) {
      const sym = opSymbol(op);
      const right = (current !== "0" || current.includes(".")) ? current : "";
      exprEl.textContent = `${fmt(previous)} ${sym} ${right}`.trim();
    } else {
      exprEl.textContent = "";
    }
  };

  const renderHistory = () => {
    historyList.innerHTML = "";
    if (history.length === 0) {
      const li = document.createElement("li");
      li.innerHTML = `<span style="color:#94a3b8">No history yet</span><span></span>`;
      historyList.appendChild(li);
      return;
    }
    history.slice(0,5).forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `<span>${item.exp}</span><span>${item.res}</span>`;
      historyList.appendChild(li);
    });
  };

  const addHistory = (exp, res) => {
    history.unshift({exp, res}); // newest on top
    if (history.length > 5) history.length = 5;
    renderHistory();
  };

  const inputNum = (d) => {
    if (justEvaluated) { current = "0"; justEvaluated = false; op = null; previous = null; }
    if (current === "0") current = d;
    else if (current.length < 16) current += d;
    setOut(current);
    setExpr();
  };

  const inputDot = () => {
    if (justEvaluated) { current = "0"; justEvaluated = false; op = null; previous = null; }
    if (!current.includes(".")) current += ".";
    setOut(current);
    setExpr();
  };

  const clearAll = () => {
    current = "0";
    previous = null;
    op = null;
    justEvaluated = false;
    setOut("0");
    exprEl.textContent = "";
  };

  const backspace = () => {
    if (justEvaluated) return;
    if (current.length <= 1) current = "0";
    else current = current.slice(0, -1);
    setOut(current);
    setExpr();
  };

  const compute = (a, b, operator) => {
    switch (operator) {
      case "+": return a + b;
      case "-": return a - b;
      case "*": return a * b;
      case "/": return b === 0 ? NaN : a / b;
      case "%": return a % b;
      default: return b;
    }
  };

  const chooseOp = (nextOp) => {
    const curNum = parseFloat(current);

    if (previous === null) {
      previous = curNum;
    } else if (op && !justEvaluated) {
      previous = compute(previous, curNum, op);
      setOut(fmt(previous));
    }

    op = nextOp;
    current = "0";
    justEvaluated = false;
    setExpr();
  };

  const equals = () => {
    if (op === null || previous === null) return;

    const curNum = parseFloat(current);
    const expText = `${fmt(previous)} ${opSymbol(op)} ${current}`;
    const result = compute(previous, curNum, op);

    setOut(fmt(result));
    addHistory(expText, fmt(result));

    // reset state
    current = fmt(result);
    previous = null;
    op = null;
    justEvaluated = true;
    exprEl.textContent = "";
  };

  // Button clicks
  document.addEventListener("click", (e) => {
    const btn = e.target.closest("button");
    if (!btn) return;

    const num = btn.getAttribute("data-num");
    const oper = btn.getAttribute("data-op");
    const action = btn.getAttribute("data-action");

    if (num !== null) inputNum(num);
    else if (oper !== null) chooseOp(oper);
    else if (action === "dot") inputDot();
    else if (action === "clear") clearAll();
    else if (action === "backspace") backspace();
    else if (action === "equals") equals();
  });

  // Keyboard support
  document.addEventListener("keydown", (e) => {
    const k = e.key;
    if (k >= "0" && k <= "9") return inputNum(k);
    if (k === ".") return inputDot();
    if (k === "Backspace") return backspace();
    if (k === "Escape") return clearAll();
    if (k === "Enter" || k === "=") { e.preventDefault(); return equals(); }
    if (k === "+" || k === "-" || k === "*" || k === "/" || k === "%") return chooseOp(k);
  });

  // init
  renderHistory();
  clearAll();
})();
</script>

</body>
</html>
